name: GitHub Pages

on:
  push:
    branches:
      - main # Set a branch to deploy
    paths-ignore:
      - "README.md"
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- Regenerate the resume (HTML + PDF) from resume/README.md on deploy ---
      # Runs only on push (deploy), not on PRs. This is what makes the resume
      # rebuild "on update" — no cron needed.
      - name: Setup Node
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Japanese fonts (for resume PDF)
        if: github.event_name == 'push'
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Cache Puppeteer Chromium
        if: github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}

      # Best-effort: if regeneration fails, fall back to the committed
      # static/resume/ artifacts so the site still deploys.
      - name: Build resume (HTML + PDF)
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          npm ci
          make resume

      # The theme is pinned to the commit in .papermod-version so that a
      # theme-side refactor can never silently break the live site again.
      - name: Clone PaperMod Theme (pinned)
        run: make clone-theme

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
